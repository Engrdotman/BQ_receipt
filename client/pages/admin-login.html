<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | BQ Receipt System</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="container" style="max-width: 450px;">
        <main class="animate-fade">
            <div class="form-card glass">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <img src="../assets/logo.png" alt="BQ Receipt Logo" style="height: 60px; margin-bottom: 1rem;">
                    <h1>Admin Login</h1>
                    <p style="color: var(--text-secondary);">Enter your credentials to manage receipts.</p>
                </div>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="admin" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <div class="form-actions" style="margin-top: 2rem;">
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
                    </div>
                </form>
                <div id="loginError" style="color: var(--error); margin-top: 1rem; text-align: center; display: none;"></div>
            </div>
        </main>
    </div>

    <script type="module">
        import api from '../js/api.js';

        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginError.style.display = 'none';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await api.auth.login({ username, password });
                localStorage.setItem('bq_token', response.token);
                localStorage.setItem('bq_user', JSON.stringify(response.user));
                
                // Redirect to create-receipt page (the "Admin" page)
                window.location.href = 'create-receipt.html';
            } catch (error) {
                loginError.textContent = error.message;
                loginError.style.display = 'block';
            }
        });
    </script>
</body>
</html>
