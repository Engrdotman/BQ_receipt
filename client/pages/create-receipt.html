<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Receipt | BQ Receipt System</title>
    <meta name="description" content="Generate professional digital receipts instantly with BQ Receipt System.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .item-row {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1rem;
        }
        .flex-1 { flex: 1; }
        .w-32 { width: 120px; }
        .btn-remove {
            background: var(--error);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: var(--transition);
        }
        .btn-remove:hover { transform: scale(1.1); }
        .form-section { margin-top: 2rem; }

        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr !important;
                gap: 0 !important;
            }
            .form-section {
                margin-top: 1.5rem;
            }
            .flex-header {
                flex-direction: column;
                gap: 0.75rem;
                text-align: left;
            }
            .item-row {
                flex-direction: column;
                align-items: stretch;
                gap: 0.75rem;
            }
            .w-32 {
                width: 100% !important;
            }
            .form-actions {
                text-align: center !important;
                margin-top: 2rem !important;
            }
            .form-actions .btn {
                width: 100%;
                padding: 1rem !important;
                font-size: 1rem !important;
            }
        }

        @media (max-width: 480px) {
            .form-card {
                padding: 1.5rem 1rem !important;
            }
            h1 {
                font-size: 1.4rem;
            }
            .btn-remove {
                align-self: flex-end;
                width: 28px;
                height: 28px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="glass animate-fade">
            <nav class="nav">
                <div class="logo-container">
                    <img src="../assets/logo.jpg" alt="BQ Receipt Logo">
                    <span style="font-size: 1.5rem; font-weight: 700;">BQ Receipt</span>
                </div>
                <div class="nav-links">
                    <a href="dashboard.html" class="active">Dashboard</a>
                </div>
                <div class="nav-actions">
                    <span id="userName" style="margin-right: 1rem; color: var(--text-secondary);"></span>
                    <a href="#" id="logoutBtn" style="color: var(--error);">Logout</a>
                </div>
            </nav>
        </header>

        <main class="animate-fade" style="animation-delay: 0.2s;">
            <div class="form-card glass">
                <h1>Generate New Receipt</h1>
                <p style="color: var(--text-secondary); margin-bottom: 2rem;">Fill in the details below to create a professional invoice.</p>
                
                <form id="receiptForm">
                    <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                        <div class="form-group">
                            <label for="customerName">Customer Name</label>
                            <input type="text" id="customerName" placeholder="e.g. John Doe" required>
                        </div>
                        <div class="form-group">
                            <label for="customerEmail">Customer Email</label>
                            <input type="email" id="customerEmail" placeholder="john@example.com" required>
                        </div>
                        <div class="form-group">
                            <label for="customerPhone">Customer Phone</label>
                            <input type="tel" id="customerPhone" placeholder="e.g. +1234567890" required>
                        </div>
                        <div class="form-group">
                            <label for="customerAddress">Customer Address</label>
                            <input type="text" id="customerAddress" placeholder="e.g. 123 Main St" required>
                        </div>
                        <div class="form-group">
                            <label for="paymentMethod">Payment Method</label>
                            <select id="paymentMethod" required>
                                <option value="">Select method</option>
                                <option value="Cash">Cash</option>
                                <option value="Card">Card</option>
                                <option value="Bank Transfer">Bank Transfer</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="imeiNumber">IMEI Number</label>
                            <input type="text" id="imeiNumber" placeholder="e.g. 123456789012345">
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="flex-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                            <h2 style="font-size: 1.2rem; font-weight: 600;">Line Items</h2>
                            <button type="button" id="addItemBtn" class="btn" style="background: rgba(255,255,255,0.1); color: var(--accent-color);">+ Add Item</button>
                        </div>
                        
                        <div id="itemsContainer">
                            <div class="item-row">
                                <div class="form-group flex-1">
                                    <input type="text" placeholder="Item Name" class="item-name" required>
                                </div>
                                <div class="form-group w-32">
                                    <input type="number" placeholder="Qty" class="item-qty" min="1" required>
                                </div>
                                <div class="form-group w-32">
                                    <input type="number" placeholder="Price" class="item-price" step="0.01" required>
                                </div>
                                <div style="width: 30px;"></div> <!-- Spacer for remove button alignment -->
                            </div>
                        </div>
                    </div>

                    <div class="form-actions" style="margin-top: 3rem; text-align: right;">
                        <button type="submit" class="btn btn-primary" style="padding: 1rem 3rem; font-size: 1.1rem;">Generate Receipt</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script type="module">
        import { checkAuth, handleLogout, getUser } from '../js/auth.js';
        import { receipts } from '../js/api.js';

        const receiptForm = document.getElementById('receiptForm');
        const itemsContainer = document.getElementById('itemsContainer');
        if (!checkAuth()) throw new Error('Not authenticated');

        // Add item button
        document.getElementById('addItemBtn').addEventListener('click', () => {
            const itemRow = document.createElement('div');
            itemRow.classList.add('item-row');
            itemRow.innerHTML = `
                <div class="form-group flex-1">
                    <input type="text" placeholder="Item Name" class="item-name" required>
                </div>
                <div class="form-group w-32">
                    <input type="number" placeholder="Qty" class="item-qty" min="1" required>
                </div>
                <div class="form-group w-32">
                    <input type="number" placeholder="Price" class="item-price" step="0.01" required>
                </div>
                <button type="button" class="btn-remove" onclick="this.parentElement.remove()">×</button>
            `;
            itemsContainer.appendChild(itemRow);
        });

        // Form submission
        receiptForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const items = [];
            document.querySelectorAll('.item-row').forEach(row => {
                items.push({
                    name: row.querySelector('.item-name').value,
                    qty: parseInt(row.querySelector('.item-qty').value),
                    price: parseFloat(row.querySelector('.item-price').value),
                    imei: row.querySelector('.item-imei')?.value || null
                });
            });

            const total = items.reduce((sum, i) => sum + (i.qty * i.price), 0);

            const receiptData = {
                customer_name: document.getElementById('customerName').value,
                customer_email: document.getElementById('customerEmail').value,
                customer_phone: document.getElementById('customerPhone').value,
                customer_address: document.getElementById('customerAddress').value,
                payment_method: document.getElementById('paymentMethod').value,
                imei_number: document.getElementById('imeiNumber').value,
                items,
                total_amount: total.toFixed(2)
            };

            try {
                await receipts.create(receiptData);
                alert('Receipt created successfully!');
                receiptForm.reset();
            } catch (error) {
                console.error('Error creating receipt:', error);
                alert('Failed to create receipt. Please try again.');
            }
        });

        const user = getUser();
        const userEl = document.getElementById('userName');
        if (userEl && user) userEl.textContent = user.username;

        document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
            e.preventDefault();
            handleLogout();
        });
    </script>
</body>
</html>
