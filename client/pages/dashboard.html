<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | BQ Receipt System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .item-row { display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem; }
        .flex-1 { flex: 1; }
        .w-32 { width: 120px; }
        .w-40 { width: 140px; }
        .btn-remove {
            background: var(--error); color: white; border: none; border-radius: 50%;
            width: 30px; height: 30px; cursor: pointer; display: flex;
            align-items: center; justify-content: center; font-size: 1.2rem;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            .nav {
                flex-direction: column;
                justify-content: center;
                gap: 1rem;
                text-align: center;
            }
            .nav-links {
                gap: 0.5rem;
            }
            .nav-links a {
                padding: 0.4rem 0.8rem;
                font-size: 0.9rem;
            }
            .nav-actions {
                font-size: 0.9rem;
            }
            /* Grid to single column */
            .form-card > form > div[style*="grid-template-columns"] {
                display: flex !important;
                flex-direction: column !important;
                gap: 0 !important;
            }
            .form-card .form-group {
                margin-bottom: 1rem;
            }
            /* Search section */
            .form-card > div[style*="justify-content"] {
                flex-direction: column !important;
                gap: 1rem !important;
                align-items: stretch !important;
            }
            #searchInput {
                width: 100% !important;
                max-width: none !important;
            }
            /* Item rows stack */
            .item-row {
                flex-direction: column !important;
                align-items: stretch !important;
                gap: 0.5rem !important;
            }
            .w-32, .w-40 {
                width: 100% !important;
            }
            .item-row > div:last-child {
                display: none !important;
            }
            .btn-remove {
                align-self: flex-end;
            }
            /* Form actions center */
            .form-actions {
                text-align: center !important;
                margin-top: 2rem !important;
            }
            .form-actions .btn {
                width: 100%;
                padding: 1rem !important;
            }
            /* Table responsive */
            .table-container {
                overflow-x: auto;
            }
            table {
                min-width: 600px;
            }
            /* Action buttons vertical */
            .action-btns {
                flex-direction: column;
                gap: 0.25rem;
            }
            .action-btns button {
                width: 100%;
                padding: 0.5rem;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .login-card, .form-card {
                padding: 1.5rem 1rem;
            }
            h1 {
                font-size: 1.5rem;
            }
        }

        /* Center the main content card */
        .tab-content .form-card {
            max-width: 900px;
            margin: 2rem auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="glass animate-fade">
            <nav class="nav">
                <div class="logo-container">
                    <img src="../assets/logo.jpg" alt="BQ Receipt Logo">
                    <span style="font-size: 1.5rem; font-weight: 700;">BQ Receipt</span>
                </div>
                <div class="nav-links">
                    <a href="#" data-tab="create" class="active" onclick="switchTab(event, 'create')">Create</a>
                    <a href="#" data-tab="history" onclick="switchTab(event, 'history')">History</a>
                </div>
                <div class="nav-actions">
                    <span id="userName" style="margin-right: 1rem; color: var(--text-secondary);"></span>
                    <a href="#" id="logoutBtn" style="color: var(--error);">Logout</a>
                </div>
            </nav>
        </header>

        <!-- Create Receipt Tab -->
        <div id="create-tab" class="tab-content active animate-fade">
            <div class="form-card glass">
                <h1>Generate New Receipt</h1>
                <p style="color: var(--text-secondary); margin-bottom: 2rem;">Fill in the details below to create a professional receipt.</p>
                
                <form id="receiptForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                        <div class="form-group">
                            <label for="customerName">Customer Name</label>
                            <input type="text" id="customerName" required>
                        </div>
                        <div class="form-group">
                            <label for="customerEmail">Customer Email</label>
                            <input type="email" id="customerEmail" required>
                        </div>
                        <div class="form-group">
                            <label for="customerPhone">Phone</label>
                            <input type="tel" id="customerPhone" required>
                        </div>
                        <div class="form-group">
                            <label for="customerAddress">Address</label>
                            <input type="text" id="customerAddress" required>
                        </div>
                        <div class="form-group">
                            <label for="paymentMethod">Payment Method</label>
                            <select id="paymentMethod" required>
                                <option value="">Select method</option>
                                <option value="Cash">Cash</option>
                                <option value="Card">Card</option>
                                <option value="Bank Transfer">Bank Transfer</option>
                            </select>
                        </div>
                    </div>

                    <div style="margin-bottom: 1rem;">
                        <label>Line Items</label>
                        <button type="button" id="addItemBtn" class="btn" style="background: rgba(255,255,255,0.1); color: var(--accent-color); margin-left: 1rem;">+ Add Item</button>
                    </div>
                    
                    <div id="itemsContainer">
                        <div class="item-row">
                            <div class="form-group flex-1"><input type="text" placeholder="Item Name" class="item-name" required></div>
                            <div class="form-group w-32"><input type="number" placeholder="Qty" class="item-qty" min="1" value="1" required></div>
                            <div class="form-group w-32"><input type="number" placeholder="Price" class="item-price" step="0.01" required></div>
                            <div class="form-group w-40"><input type="text" placeholder="IMEI (optional)" class="item-imei"></div>
                            <div style="width: 30px;"></div>
                        </div>
                    </div>

                    <div class="form-actions" style="margin-top: 3rem; text-align: right;">
                        <button type="submit" class="btn btn-primary" style="padding: 1rem 3rem; font-size: 1.1rem;">Generate Receipt</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- History Tab -->
        <div id="history-tab" class="tab-content animate-fade">
            <div class="form-card glass">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <div>
                        <h1>Receipt History</h1>
                        <p style="color: var(--text-secondary);">Manage and track all generated receipts.</p>
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <input type="text" id="searchInput" placeholder="Search..." style="width: 200px;">
                        <button id="searchBtn" class="btn btn-primary">Search</button>
                    </div>
                </div>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Customer</th>
                                <th>Email</th>
                                <th>Total</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="receiptsTableBody">
                            <tr>
                                <td colspan="5" style="text-align: center; padding: 4rem; color: var(--text-secondary);">
                                    Loading...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

<script type="module">
        import { auth, receipts } from '../js/api.js';
        import { checkAuth, getUser, handleLogout } from '../js/auth.js';

        function switchTab(e, tab) {
            e.preventDefault();
            console.log('Tab switched to:', tab);
            const tabLinks = document.querySelectorAll('[data-tab]');
            const createTab = document.getElementById('create-tab');
            const historyTab = document.getElementById('history-tab');
            
            tabLinks.forEach(l => l.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            
            createTab.classList.remove('active');
            historyTab.classList.remove('active');
            
            if (tab === 'create') {
                createTab.classList.add('active');
            } else {
                historyTab.classList.add('active');
                loadReceipts();
            }
        }
        window.switchTab = switchTab;

        if (!checkAuth()) {
            throw new Error('Not authenticated');
        }

        const user = getUser();
        if (user) {
            document.getElementById('userName').textContent = user.username || `User (${user.role || 'admin'})`;
        }

        // Wire up logout button
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            handleLogout();
        });

        let allReceipts = [];
        async function loadReceipts() {
            try {
                allReceipts = await receipts.getAll();
                renderReceipts(allReceipts);
            } catch (error) {
                document.getElementById('receiptsTableBody').innerHTML = 
                    `<tr><td colspan="5" style="text-align: center; color: var(--error);">Failed to load receipts</td></tr>`;
            }
        }

        function renderReceipts(data) {
            const tbody = document.getElementById('receiptsTableBody');
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center;">No receipts found.</td></tr>`;
                return;
            }
            tbody.innerHTML = data.map(r => `
                <tr>
                    <td>${new Date(r.created_at).toLocaleDateString()}</td>
                    <td style="font-weight: 500;">${r.customer_name}</td>
                    <td style="color: var(--text-secondary);">${r.customer_email || 'N/A'}</td>
                    <td style="color: var(--accent-color); font-weight: 600;">#${parseFloat(r.total_amount).toFixed(2)}</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-download" data-id="${r.id}">Download</button>
                            <button class="btn-delete" data-id="${r.id}">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');

            document.querySelectorAll('.btn-download').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    try {
                        await receipts.download(e.target.dataset.id);
                    } catch (err) {
                        alert('Download failed: ' + err.message);
                    }
                });
            });

            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    if (confirm('Delete this receipt?')) {
                        try {
                            await receipts.delete(e.target.dataset.id);
                            loadReceipts();
                        } catch (err) {
                            alert(err.message);
                        }
                    }
                });
            });
        }

        document.getElementById('searchBtn').addEventListener('click', () => {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allReceipts.filter(r => 
                r.customer_name.toLowerCase().includes(q) || r.customer_email?.toLowerCase().includes(q));
            renderReceipts(filtered);
        });

        document.getElementById('addItemBtn').addEventListener('click', () => {
            const container = document.getElementById('itemsContainer');
            const row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = `
                <div class="form-group flex-1"><input type="text" placeholder="Item Name" class="item-name" required></div>
                <div class="form-group w-32"><input type="number" placeholder="Qty" class="item-qty" min="1" value="1" required></div>
                <div class="form-group w-32"><input type="number" placeholder="Price" class="item-price" step="0.01" required></div>
                <div class="form-group w-40"><input type="text" placeholder="IMEI (optional)" class="item-imei"></div>
                <button type="button" class="btn-remove remove-item">×</button>
            `;
            container.appendChild(row);
            row.querySelector('.remove-item').addEventListener('click', () => row.remove());
        });

        document.getElementById('receiptForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const items = [];
            document.querySelectorAll('.item-row').forEach(row => {
                items.push({
                    name: row.querySelector('.item-name').value,
                    qty: parseInt(row.querySelector('.item-qty').value),
                    price: parseFloat(row.querySelector('.item-price').value),
                    imei: row.querySelector('.item-imei').value || null
                });
            });

            const total = items.reduce((sum, i) => sum + (i.qty * i.price), 0);

            try {
                await receipts.create({
                    customer_name: document.getElementById('customerName').value,
                    customer_email: document.getElementById('customerEmail').value,
                    customer_phone: document.getElementById('customerPhone').value,
                    customer_address: document.getElementById('customerAddress').value,
                    payment_method: document.getElementById('paymentMethod').value,
                    items,
                    total_amount: total
                });
                alert('Receipt created successfully!');
                document.getElementById('receiptForm').reset();
            } catch (err) {
                alert(err.message);
            }
        });
    </script>
</body>
</html>
