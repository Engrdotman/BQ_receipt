<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | BQ Receipt System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        body {
            background: linear-gradient(3deg, #0f0f0f 0%, #1a1a2e 100%);
        }
        .login-container {
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem 2.5rem;
        }
        .brand-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }
        .brand-logo img {
            height: 80px;
            width: auto;
            max-width: 100%;
            border-radius: 10%;
            object-fit: cover;
        }
        .brand-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
        }
        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            color: #aaa;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #ff6b00;
            box-shadow: 0 0 0 3px rgba(255, 107, 0, 0.15);
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff6b00, #e55a00);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 0, 0.3);
        }
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #888;
            font-size: 0.9rem;
        }
        .back-link a {
            color: #ff6b00;
            text-decoration: none;
        }
        .message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1rem;
            text-align: center;
            display: none;
        }
        .message.show {
            display: block;
        }
        .error-message {
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid rgba(255, 82, 82, 0.3);
            color: #ff5252;
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1rem;
            text-align: center;
            display: none;
        }
        .error-message.show {
            display: block;
        }

        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            .login-container {
                padding: 1rem;
                max-width: 100%;
            }
            .login-card {
                padding: 2rem 1.5rem;
            }
            .brand-logo img {
                height: 50px;
            }
            .brand-name {
                font-size: 1.5rem;
            }
            h1 {
                font-size: 1.3rem;
            }
            .form-group input {
                padding: 12px 14px;
                font-size: 0.95rem;
            }
            .btn-primary {
                padding: 14px;
                font-size: 0.95rem;
            }
            .form-group {
                margin-bottom: 1rem;
            }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 1.5rem 1rem;
                border-radius: 16px;
            }
            .brand-logo img {
                height: 50px;
            }
            .brand-name {
                font-size: 1.3rem;
            }
            .subtitle {
                font-size: 0.85rem;
                margin-bottom: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <main>
            <div class="login-card">
                <div class="brand-logo">
                    <img src="../assets/logo.jpg" alt="BQ">
                    <span class="brand-name">BQ Receipt</span>
                </div>
                <h1>New Password</h1>
                <p class="subtitle">Enter your new password</p>
                
                <form id="resetForm">
                    <input type="hidden" id="token">
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" placeholder="Enter new password" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                    </div>
                    <button type="submit" class="btn-primary">Reset Password</button>
                </form>
                <div id="message" class="message"></div>
                <div id="error" class="error-message"></div>
                
                <div class="back-link">
                    <a href="login.html">← Back to login</a>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { auth } from '../js/api.js';

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('error').textContent = 'Invalid reset link. Please request a new password reset.';
            document.getElementById('error').classList.add('show');
            document.getElementById('resetForm').style.display = 'none';
        }

        document.getElementById('token').value = token;

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageEl = document.getElementById('message');
            const errorEl = document.getElementById('error');

            if (newPassword !== confirmPassword) {
                errorEl.textContent = 'Passwords do not match';
                errorEl.classList.add('show');
                return;
            }

            if (newPassword.length < 6) {
                errorEl.textContent = 'Password must be at least 6 characters';
                errorEl.classList.add('show');
                return;
            }

            messageEl.classList.remove('show');
            errorEl.classList.remove('show');

            try {
                await auth.resetPassword({ token, newPassword });

                messageEl.textContent = 'Password reset successfully! Redirecting to login...';
                messageEl.classList.add('show');
                document.getElementById('resetForm').reset();

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                errorEl.textContent = error.message;
                errorEl.classList.add('show');
            }
        });
    </script>
</body>
</html>
