<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | BQ Receipt System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        body {
            background: linear-gradient(3deg, #0f0f0f 0%, #1a1a2e 100%);
        }
        .login-container {
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem 2.5rem;
        }
        .brand-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }
        .brand-logo img {
            height: 48px;
            width: auto;
            max-width: 100%;
        }
        .brand-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
        }
        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            color: #aaa;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #ff6b00;
            box-shadow: 0 0 0 3px rgba(255, 107, 0, 0.15);
        }
        .form-group input::placeholder {
            color: #555;
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff6b00, #e55a00);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 0, 0.3);
        }
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #888;
            font-size: 0.9rem;
        }
        .back-link a {
            color: #ff6b00;
            text-decoration: none;
        }
        .message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1rem;
            text-align: center;
            display: none;
        }
        .message.show {
            display: block;
        }
        .error-message {
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid rgba(255, 82, 82, 0.3);
            color: #ff5252;
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1rem;
            text-align: center;
            display: none;
        }
        .error-message.show {
            display: block;
        }

        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            .login-container {
                padding: 1rem;
                max-width: 100%;
            }
            .login-card {
                padding: 2rem 1.5rem;
            }
            .brand-logo img {
                height: 40px;
            }
            .brand-name {
                font-size: 1.5rem;
            }
            h1 {
                font-size: 1.3rem;
            }
            .form-group input {
                padding: 12px 14px;
                font-size: 0.95rem;
            }
            .btn-primary {
                padding: 14px;
                font-size: 0.95rem;
            }
            .form-group {
                margin-bottom: 1rem;
            }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 1.5rem 1rem;
                border-radius: 16px;
            }
            .brand-logo img {
                height: 36px;
            }
            .brand-name {
                font-size: 1.3rem;
            }
            .subtitle {
                font-size: 0.85rem;
                margin-bottom: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <main>
            <div class="login-card">
                <div class="brand-logo">
                    <img src="../assets/logo.jpg" alt="BQ">
                    <span class="brand-name">BQ Receipt</span>
                </div>
                <h1>Reset Password</h1>
                <p class="subtitle">Enter your username to receive reset instructions</p>
                
                <form id="forgotForm">
                    <div class="form-group">
                        <label for="organization">Organization</label>
                        <input type="text" id="organization" placeholder="e.g. bq_receipt" required>
                    </div>
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Enter your username" required>
                    </div>
                    <button type="submit" class="btn-primary">Send Reset Link</button>
                </form>
                <div id="message" class="message"></div>
                <div id="error" class="error-message"></div>
                
                <div class="back-link">
                    <a href="login.html">← Back to login</a>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        const API_URL = 'http://localhost:5000/api';
        
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const organization = document.getElementById('organization').value;
            const username = document.getElementById('username').value;
            const messageEl = document.getElementById('message');
            const errorEl = document.getElementById('error');
            
            messageEl.classList.remove('show');
            errorEl.classList.remove('show');
            
            try {
                const response = await fetch(`${API_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenant: organization, username })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to process request');
                }
                
                messageEl.textContent = 'Password reset instructions have been sent to your registered email.';
                messageEl.classList.add('show');
                document.getElementById('forgotForm').reset();
            } catch (error) {
                errorEl.textContent = error.message;
                errorEl.classList.add('show');
            }
        });
    </script>
</body>
</html>
