<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BQ Receipt</title>
    <script>
    (function() {
        const token = localStorage.getItem('bq_token');

        let user = {};
        try {
            user = JSON.parse(localStorage.getItem('bq_user')) || {};
        } catch (e) {
            user = {};
        }

        if (!token) {
            window.location.href = '/pages/login.html';
            return;
        }

        if (user.type === 'master') {
            window.location.href = '/pages/master-dashboard.html';
        } else if (user.type === 'client') {
            window.location.href = '/pages/dashboard.html';
        } else {
            window.location.href = '/pages/login.html';
        }
    })();
    </script>
</head>
<body>
    <p>Redirecting to <a href="/pages/login.html">login</a>...</p>
</body>
</html>
